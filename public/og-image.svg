<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="50%" stop-color="#16132b"/>
      <stop offset="100%" stop-color="#0f0d24"/>
    </linearGradient>
    <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4f46e5"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="text-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="glow1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#4f46e5" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#4f46e5" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="80%" cy="70%" r="35%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#7c3aed" stop-opacity="0"/>
    </radialGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#4f46e5" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.04" stroke="#818cf8" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/><line x1="60" y1="0" x2="60" y2="630"/>
    <line x1="120" y1="0" x2="120" y2="630"/><line x1="180" y1="0" x2="180" y2="630"/>
    <line x1="240" y1="0" x2="240" y2="630"/><line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="360" y1="0" x2="360" y2="630"/><line x1="420" y1="0" x2="420" y2="630"/>
    <line x1="480" y1="0" x2="480" y2="630"/><line x1="540" y1="0" x2="540" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/><line x1="660" y1="0" x2="660" y2="630"/>
    <line x1="720" y1="0" x2="720" y2="630"/><line x1="780" y1="0" x2="780" y2="630"/>
    <line x1="840" y1="0" x2="840" y2="630"/><line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="960" y1="0" x2="960" y2="630"/><line x1="1020" y1="0" x2="1020" y2="630"/>
    <line x1="1080" y1="0" x2="1080" y2="630"/><line x1="1140" y1="0" x2="1140" y2="630"/>
    <line x1="0" y1="0" x2="1200" y2="0"/><line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="120" x2="1200" y2="120"/><line x1="0" y1="180" x2="1200" y2="180"/>
    <line x1="0" y1="240" x2="1200" y2="240"/><line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="360" x2="1200" y2="360"/><line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="0" y1="480" x2="1200" y2="480"/><line x1="0" y1="540" x2="1200" y2="540"/>
    <line x1="0" y1="600" x2="1200" y2="600"/>
  </g>

  <!-- Logo icon -->
  <g filter="url(#shadow)">
    <rect x="80" y="180" width="72" height="72" rx="18" fill="url(#logo-grad)"/>
    <!-- T letter as path -->
    <rect x="98" y="196" width="36" height="6" rx="2" fill="white"/>
    <rect x="112" y="196" width="8" height="42" rx="2" fill="white"/>
  </g>

  <!-- Brand name -->
  <text x="168" y="234" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="700" fill="white">techify</text>

  <!-- Tagline -->
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="600" fill="white">AI-Powered Custom Tools</text>
  <text x="80" y="385" font-family="system-ui, -apple-system, sans-serif" font-size="38" font-weight="600" fill="white">for Small Businesses</text>

  <!-- European sovereignty badge -->
  <g transform="translate(80, 430)">
    <rect width="280" height="44" rx="22" fill="#4f46e5" fill-opacity="0.2" stroke="#4f46e5" stroke-opacity="0.4" stroke-width="1.5"/>
    <text x="22" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="600" letter-spacing="1.5" fill="#818cf8">SOVEREIGN EUROPEAN HOSTING</text>
  </g>

  <!-- Decorative elements on the right -->
  <g opacity="0.08">
    <circle cx="950" cy="150" r="180" fill="none" stroke="#818cf8" stroke-width="1"/>
    <circle cx="950" cy="150" r="130" fill="none" stroke="#a78bfa" stroke-width="1"/>
    <circle cx="950" cy="150" r="80" fill="none" stroke="#818cf8" stroke-width="1"/>
  </g>
  <g opacity="0.06">
    <circle cx="1050" cy="450" r="150" fill="none" stroke="#7c3aed" stroke-width="1"/>
    <circle cx="1050" cy="450" r="100" fill="none" stroke="#a78bfa" stroke-width="1"/>
  </g>

  <!-- Accent dots -->
  <circle cx="870" cy="315" r="4" fill="#4f46e5" opacity="0.5"/>
  <circle cx="920" cy="280" r="3" fill="#7c3aed" opacity="0.4"/>
  <circle cx="980" cy="350" r="5" fill="#818cf8" opacity="0.3"/>
  <circle cx="1050" cy="300" r="3" fill="#a78bfa" opacity="0.4"/>

  <!-- Bottom accent line -->
  <rect x="0" y="620" width="1200" height="10" fill="url(#logo-grad)"/>
</svg>
